<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile — ChalO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --ink:         #0F172A;
            --bg:          #F8FAFC;
            --surface:     #FFFFFF;
            --border:      #E2E8F0;
            --muted:       #64748B;
            --subtle:      #94A3B8;
            --brand:       #1E293B;
            --accent:      #F59E0B;
            --accent-dark: #D97706;
            --accent-faint:#FFFBEB;
            --brand-soft:  var(--accent-faint);
            --brand-dark:  var(--accent-dark);
            --brand-glow:  rgba(0,0,0,0);
            --line:        var(--border);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--ink);
        }

        a { text-decoration: none; }

        /* ── Header ───────────────────────────────────────────────────── */
        .app-header {
            background: #fff;
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .app-header .inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            height: 60px;
            display: flex; align-items: center; gap: 1rem;
        }

        .brand { display: inline-flex; align-items: center; gap: 0.55rem; flex-shrink: 0; }

        .brand .logo-mark {
            width: 32px; height: 32px; background: var(--brand); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1rem;
        }

        .brand .logo-name { font-size: 1.35rem; font-weight: 800; color: var(--ink); letter-spacing: -0.4px; }

        .header-spacer { flex: 1; }
        .header-actions { display: flex; align-items: center; gap: 0.6rem; }

        .btn-brand {
            display: inline-flex; align-items: center; gap: 0.4rem;
            height: 36px; padding: 0 1rem; border: none; border-radius: 8px;
            background: var(--accent); color: var(--ink);
            font-size: 0.875rem; font-weight: 600;
            transition: background 0.15s, transform 0.1s;
        }

        .btn-brand:hover { background: var(--accent-dark); color: var(--ink); transform: translateY(-1px); }

        .profile-btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            height: 36px; padding: 0 0.35rem 0 0.85rem;
            border: 1px solid var(--line); border-radius: 8px;
            background: #fff; color: var(--ink); font-weight: 600; font-size: 0.875rem;
        }

        .profile-btn:hover { border-color: #CBD5E1; color: var(--ink); }

        .avatar {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--accent-faint); color: var(--brand);
            border: 1.5px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.8rem; flex-shrink: 0;
        }

        .dropdown-menu {
            border: 1px solid var(--line); border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 0.375rem; min-width: 220px;
        }

        .dropdown-item {
            border-radius: 8px; padding: 0.55rem 0.75rem;
            font-size: 0.875rem; font-weight: 500;
            display: flex; align-items: center; gap: 0.6rem;
            color: var(--ink);
        }

        .dropdown-item i { color: var(--subtle); width: 16px; }
        .dropdown-item.active { background: var(--accent-faint); color: var(--ink); font-weight: 600; }
        .dropdown-item.active i { color: var(--accent-dark); }
        .dropdown-item:hover { background: var(--bg); color: var(--ink); }

        .btn-notif {
            position: relative;
            display: inline-flex; align-items: center; justify-content: center;
            width: 36px; height: 36px;
            border: 1px solid var(--line); border-radius: 8px;
            background: #fff; color: var(--ink);
            transition: border-color 0.15s;
            flex-shrink: 0;
        }
        .btn-notif:hover { border-color: #CBD5E1; color: var(--ink); }
        .notif-badge {
            position: absolute; top: -4px; right: -4px;
            min-width: 16px; height: 16px; padding: 0 3px;
            border-radius: 100px; background: var(--accent); color: var(--ink);
            font-size: 0.62rem; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            line-height: 1; border: 2px solid #fff;
        }

        /* ── Page container ───────────────────────────────────────────── */
        .container-app {
            max-width: 680px;
            margin: 0 auto;
            padding: 2rem 1.25rem 4rem;
        }

        .page-head { margin-bottom: 1.75rem; }
        .page-eyebrow {
            font-size: 0.78rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--accent-dark); margin-bottom: 0.4rem;
        }
        .page-title  { font-size: 2rem; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 0.35rem; }
        .page-sub    { color: var(--muted); font-size: 0.95rem; }

        /* ── Form card ────────────────────────────────────────────────── */
        .form-card {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 20px;
            overflow: hidden;
        }

        .form-card-head {
            padding: 1.5rem 2rem 1.25rem;
            border-bottom: 1px solid var(--line);
        }

        .form-card-title {
            font-size: 1.05rem; font-weight: 800;
            letter-spacing: -0.3px; color: var(--ink);
        }

        .form-card-body { padding: 1.75rem 2rem; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group:last-child { margin-bottom: 0; }

        .form-label {
            display: block;
            font-size: 0.85rem; font-weight: 700;
            color: var(--ink); margin-bottom: 0.45rem;
        }

        .form-control {
            width: 100%; padding: 0.7rem 0.95rem;
            border: 1.5px solid var(--line); border-radius: 12px;
            font-size: 0.95rem; font-family: inherit; color: var(--ink);
            background: #fff;
            transition: border-color 0.18s, box-shadow 0.18s;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--brand);
            box-shadow: none;
        }

        .form-control.is-invalid { border-color: #DC2626; }
        .form-control.is-invalid:focus { box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15); }

        .invalid-feedback {
            font-size: 0.82rem; color: #DC2626;
            margin-top: 0.35rem; display: none;
        }

        .form-control.is-invalid ~ .invalid-feedback { display: block; }

        .char-count {
            font-size: 0.78rem; color: var(--muted);
            text-align: right; margin-top: 0.3rem;
        }

        .form-hint {
            font-size: 0.82rem; color: var(--muted); margin-top: 0.35rem;
        }

        /* ── Form footer ──────────────────────────────────────────────── */
        .form-footer {
            padding: 1.25rem 2rem;
            border-top: 1px solid var(--line);
            display: flex; align-items: center; gap: 0.75rem;
            justify-content: flex-end;
        }

        .btn-cancel {
            display: inline-flex; align-items: center; gap: 0.4rem;
            height: 44px; padding: 0 1.3rem; border-radius: 12px;
            border: 1px solid var(--line); background: #fff; color: var(--ink);
            font-weight: 600; font-size: 0.9rem;
            transition: background 0.15s;
        }

        .btn-cancel:hover { background: #F7F7F7; color: var(--ink); }

        .btn-save {
            display: inline-flex; align-items: center; gap: 0.4rem;
            height: 44px; padding: 0 1.5rem; border-radius: 12px;
            border: none; background: var(--brand); color: #fff;
            font-weight: 700; font-size: 0.9rem;
            transition: background 0.18s, transform 0.1s;
            cursor: pointer;
        }

        .btn-save:hover { background: #0F172A; transform: translateY(-1px); }

        /* ── Responsive ───────────────────────────────────────────────── */
        @media (max-width: 600px) {
            .header-actions .label-hide { display: none; }
            .page-title { font-size: 1.6rem; }
            .form-card-body { padding: 1.25rem 1.25rem; }
            .form-card-head { padding: 1.25rem 1.25rem 1rem; }
            .form-footer { padding: 1rem 1.25rem; }
        }
    </style>
</head>
<body>

    <!-- ── Header ───────────────────────────────────────────────────────── -->
    <header class="app-header">
        <div class="inner">
            <a th:href="@{/dashboard}" class="brand">
                <span class="logo-mark">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="11.5" cy="4.5" r="2.5" fill="white"/>
                        <line x1="4.5" y1="12.5" x2="11.5" y2="4.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
                        <circle cx="4.5" cy="12.5" r="1.5" fill="rgba(255,255,255,0.55)"/>
                    </svg>
                </span>
                <span class="logo-name">ChalO</span>
            </a>

            <div class="header-spacer"></div>

            <div class="header-actions">
                <a th:href="@{/adventures/new}" class="btn-brand">
                    <i class="bi bi-plus-lg"></i>
                    <span class="label-hide">Host Adventure</span>
                </a>

                <a th:href="@{/notifications}" class="btn-notif" title="Notifications">
                    <i class="bi bi-bell-fill" style="font-size:0.95rem;"></i>
                    <span class="notif-badge" th:if="${unreadNotificationCount > 0}"
                          th:text="${unreadNotificationCount > 99 ? '99+' : unreadNotificationCount}">3</span>
                </a>

                <div class="dropdown">
                    <button class="profile-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="avatar" th:text="${#strings.substring(userName, 0, 1).toUpperCase()}">A</span>
                        <i class="bi bi-chevron-down" style="font-size:0.7rem;"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <span class="dropdown-item-text px-2 py-1">
                                <small class="text-muted">Signed in as</small><br>
                                <strong th:text="${userName}">Explorer</strong>
                            </span>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/dashboard}"><i class="bi bi-grid"></i> Dashboard</a></li>
                        <li><a class="dropdown-item" th:href="@{/my-adventures}"><i class="bi bi-backpack2"></i> My Adventures</a></li>
                        <li><a class="dropdown-item" th:href="@{/my-crews}"><i class="bi bi-people"></i> My Crews</a></li>
                        <li><a class="dropdown-item active" th:href="@{/profile}"><i class="bi bi-person"></i> Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="m-0">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right text-danger"></i> Log out
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <!-- ── Page body ────────────────────────────────────────────────────── -->
    <div class="container-app">

        <div class="page-head">
            <p class="page-eyebrow">Account</p>
            <h1 class="page-title">Edit Profile</h1>
            <p class="page-sub">Update your name and bio. Email cannot be changed.</p>
        </div>

        <form th:action="@{/profile/edit}" method="post" th:object="${form}" novalidate>

            <div class="form-card">
                <div class="form-card-head">
                    <span class="form-card-title">Personal Information</span>
                </div>
                <div class="form-card-body">

                    <!-- Name -->
                    <div class="form-group">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" id="name" th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'"
                               class="form-control"
                               maxlength="100"
                               placeholder="Your display name"
                               autocomplete="name">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                             th:errors="*{name}">Name is required.</div>
                        <p class="char-count"><span id="nameCount">0</span> / 100</p>
                    </div>

                    <!-- Bio -->
                    <div class="form-group">
                        <label for="bio" class="form-label">Bio <span style="color:var(--muted); font-weight:500;">(optional)</span></label>
                        <textarea id="bio" th:field="*{bio}"
                                  th:classappend="${#fields.hasErrors('bio')} ? ' is-invalid'"
                                  class="form-control"
                                  rows="4"
                                  maxlength="500"
                                  placeholder="Tell other explorers a bit about yourself…"
                                  style="resize:vertical;"></textarea>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('bio')}"
                             th:errors="*{bio}">Bio is too long.</div>
                        <p class="char-count"><span id="bioCount">0</span> / 500</p>
                    </div>

                </div>
                <div class="form-footer">
                    <a th:href="@{/profile}" class="btn-cancel">
                        <i class="bi bi-x-lg"></i> Cancel
                    </a>
                    <button type="submit" class="btn-save">
                        <i class="bi bi-check-lg"></i> Save Changes
                    </button>
                </div>
            </div>

        </form>

    </div>

    <footer style="border-top:1px solid #E2E8F0; padding:1.25rem 1.5rem; margin-top:2rem;">
        <div style="max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between;">
            <span style="font-size:0.75rem; color:#94A3B8; font-weight:500;">© 2026 ChalO</span>
            <div style="display:flex; gap:1.5rem;">
                <a href="#" style="font-size:0.75rem; color:#94A3B8; font-weight:500; text-decoration:none;">Privacy</a>
                <a href="#" style="font-size:0.75rem; color:#94A3B8; font-weight:500; text-decoration:none;">Terms</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateCount(inputId, countId) {
            var el = document.getElementById(inputId);
            var counter = document.getElementById(countId);
            if (el && counter) {
                counter.textContent = el.value.length;
                el.addEventListener('input', function () { counter.textContent = this.value.length; });
            }
        }
        updateCount('name', 'nameCount');
        updateCount('bio',  'bioCount');
    </script>
</body>
</html>
